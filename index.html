<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SI 단위 마스터 방탈출</title>
    
    <!-- 스타일(Tailwind CSS) 로드 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }
        body { font-family: 'Pretendard', 'Malgun Gothic', sans-serif; }
    </style>

    <!-- React 및 Babel 로드 (브라우저에서 바로 실행하기 위함) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // 아이콘 SVG 컴포넌트 (외부 라이브러리 없이 독립 실행하기 위해 내장)
        const IconBookOpen = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>;
        const IconAward = () => <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>;
        const IconPlay = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>;
        const IconCheckCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>;
        const IconXCircle = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>;
        const IconChevronRight = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>;
        const IconRefresh = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><polyline points="3 3 3 8 8 8"></polyline></svg>;

        // 퀴즈 데이터 정의 (총 30문제)
        const QUESTIONS = [
            // [1단계] 기본 단위 (10문제)
            { stage: "제1구역: 기본 단위", text: "길이를 나타내는 SI 기본 단위의 기호는 무엇일까요?", options: ["cm", "m", "km", "L"], answer: 1, explanation: "길이의 SI 기본 단위는 m(미터)입니다." },
            { stage: "제1구역: 기본 단위", text: "질량을 나타내는 SI 기본 단위의 기호는 무엇일까요?", options: ["g", "mg", "kg", "t"], answer: 2, explanation: "질량의 SI 기본 단위는 유일하게 접두어가 포함된 kg(킬로그램)입니다." },
            { stage: "제1구역: 기본 단위", text: "시간을 나타내는 SI 기본 단위의 기호는 무엇일까요?", options: ["h (시간)", "m (분)", "s (초)", "ms (밀리초)"], answer: 2, explanation: "시간의 SI 기본 단위는 s(초)입니다." },
            { stage: "제1구역: 기본 단위", text: "전류를 나타내는 SI 기본 단위의 기호는 무엇일까요?", options: ["V", "W", "A", "Ω"], answer: 2, explanation: "전류의 SI 기본 단위는 A(암페어)입니다." },
            { stage: "제1구역: 기본 단위", text: "열역학 온도를 나타내는 SI 기본 단위의 기호는 무엇일까요?", options: ["°C", "°F", "K", "J"], answer: 2, explanation: "온도의 SI 기본 단위는 절대 온도인 K(켈빈)입니다." },
            { stage: "제1구역: 기본 단위", text: "물질의 양을 나타내는 SI 기본 단위의 기호는 무엇일까요?", options: ["g", "L", "mol", "cd"], answer: 2, explanation: "물질의 양을 나타내는 SI 기본 단위는 mol(몰)입니다." },
            { stage: "제1구역: 기본 단위", text: "빛의 밝기(광도)를 나타내는 SI 기본 단위의 기호는 무엇일까요?", options: ["cd", "lx", "lm", "W"], answer: 0, explanation: "광도의 SI 기본 단위는 cd(칸델라)입니다." },
            { stage: "제1구역: 기본 단위", text: "다음 중 SI 기본 단위가 아닌 것은?", options: ["A (암페어)", "K (켈빈)", "N (뉴턴)", "s (초)"], answer: 2, explanation: "N(뉴턴)은 힘의 단위로, 기본 단위가 아닌 유도 단위입니다." },
            { stage: "제1구역: 기본 단위", text: "SI 기본 단위 중 '암페어(A)'는 무엇을 측정하는 단위입니까?", options: ["전압", "저항", "전력", "전류"], answer: 3, explanation: "A(암페어)는 전류를 측정하는 기본 단위입니다." },
            { stage: "제1구역: 기본 단위", text: "SI 기본 단위 중 '칸델라(cd)'는 무엇을 측정하는 단위입니까?", options: ["에너지", "광도(빛의 밝기)", "압력", "주파수"], answer: 1, explanation: "cd(칸델라)는 빛의 밝기인 광도를 나타냅니다." },

            // [2단계] 접두어 - 커지는 단위 (8문제)
            { stage: "제2구역: 접두어(확장)", text: "10¹² 을 의미하는 접두어 '테라'의 기호는 무엇입니까?", options: ["T", "G", "M", "k"], answer: 0, explanation: "테라(T)는 10의 12제곱을 의미합니다." },
            { stage: "제2구역: 접두어(확장)", text: "접두어 '기가(G)'는 10의 몇 제곱을 의미합니까?", options: ["10⁶", "10⁹", "10¹²", "10¹⁵"], answer: 1, explanation: "기가(G)는 10의 9제곱을 의미합니다." },
            { stage: "제2구역: 접두어(확장)", text: "10⁶ 을 의미하는 접두어의 이름은 무엇입니까?", options: ["킬로(k)", "메가(M)", "기가(G)", "테라(T)"], answer: 1, explanation: "10⁶은 메가(M)입니다." },
            { stage: "제2구역: 접두어(확장)", text: "접두어 '킬로(k)'는 10의 몇 제곱을 의미합니까?", options: ["10¹", "10²", "10³", "10⁴"], answer: 2, explanation: "킬로(k)는 10의 3제곱(1000)을 의미합니다." },
            { stage: "제2구역: 접두어(확장)", text: "10² 를 의미하는 접두어 '헥토'의 기호는 무엇입니까?", options: ["h", "da", "d", "c"], answer: 0, explanation: "헥토(h)는 10의 2제곱(100)을 의미합니다." },
            { stage: "제2구역: 접두어(확장)", text: "접두어 '데카(da)'는 10의 몇 제곱을 의미합니까?", options: ["10¹", "10²", "10⁻¹", "10⁻²"], answer: 0, explanation: "데카(da)는 10의 1제곱(10)을 의미합니다." },
            { stage: "제2구역: 접두어(확장)", text: "다음 중 가장 큰 값을 나타내는 접두어는?", options: ["메가(M)", "테라(T)", "기가(G)", "킬로(k)"], answer: 1, explanation: "테라(T)는 10¹²로 제시된 보기 중 가장 큽니다." },
            { stage: "제2구역: 접두어(확장)", text: "1 km(킬로미터)는 몇 m(미터) 입니까?", options: ["10 m", "100 m", "1,000 m", "10,000 m"], answer: 2, explanation: "킬로(k)가 10³ 이므로 1 km = 1,000 m 입니다." },

            // [3단계] 접두어 - 작아지는 단위 (7문제)
            { stage: "제3구역: 접두어(축소)", text: "10⁻¹ 을 의미하는 접두어 '데시'의 기호는 무엇입니까?", options: ["da", "d", "c", "m"], answer: 1, explanation: "데시(d)는 10의 -1제곱(0.1)을 의미합니다." },
            { stage: "제3구역: 접두어(축소)", text: "접두어 '센티(c)'는 10의 몇 제곱을 의미합니까?", options: ["10⁻¹", "10⁻²", "10⁻³", "10⁻⁶"], answer: 1, explanation: "센티(c)는 10의 -2제곱(0.01)을 의미합니다." },
            { stage: "제3구역: 접두어(축소)", text: "10⁻³ 을 의미하는 접두어의 이름은 무엇입니까?", options: ["센티(c)", "밀리(m)", "마이크로(μ)", "나노(n)"], answer: 1, explanation: "10⁻³은 밀리(m)입니다." },
            { stage: "제3구역: 접두어(축소)", text: "접두어 '마이크로(μ)'는 10의 몇 제곱을 의미합니까?", options: ["10⁻³", "10⁻⁶", "10⁻⁹", "10⁻¹²"], answer: 1, explanation: "마이크로(μ)는 10의 -6제곱을 의미합니다." },
            { stage: "제3구역: 접두어(축소)", text: "10⁻⁹ 를 의미하는 접두어 '나노'의 기호는 무엇입니까?", options: ["m", "μ", "n", "p"], answer: 2, explanation: "나노(n)는 10의 -9제곱을 의미합니다." },
            { stage: "제3구역: 접두어(축소)", text: "접두어 '피코(p)'는 10의 몇 제곱을 의미합니까?", options: ["10⁻³", "10⁻⁶", "10⁻⁹", "10⁻¹²"], answer: 3, explanation: "피코(p)는 10의 -12제곱을 의미합니다." },
            { stage: "제3구역: 접두어(축소)", text: "다음 중 가장 작은 값을 나타내는 접두어는?", options: ["밀리(m)", "피코(p)", "나노(n)", "마이크로(μ)"], answer: 1, explanation: "피코(p)는 10⁻¹²로 제시된 보기 중 가장 작습니다." },

            // [4단계] 종합 응용 (5문제)
            { stage: "제4구역: 종합 응용", text: "1 cm(센티미터)는 몇 m(미터) 입니까?", options: ["10⁻¹ m", "10⁻² m", "10⁻³ m", "10⁻⁶ m"], answer: 1, explanation: "센티(c)는 10⁻²를 의미하므로, 1 cm = 10⁻² m 입니다." },
            { stage: "제4구역: 종합 응용", text: "1 mg(밀리그램)은 몇 g(그램) 입니까?", options: ["10⁻² g", "10⁻³ g", "10⁻⁶ g", "10⁻⁹ g"], answer: 1, explanation: "밀리(m)는 10⁻³을 의미하므로, 1 mg = 10⁻³ g 입니다." },
            { stage: "제4구역: 종합 응용", text: "1 ns(나노초)는 몇 s(초) 입니까?", options: ["10⁻³ s", "10⁻⁶ s", "10⁻⁹ s", "10⁻¹² s"], answer: 2, explanation: "나노(n)는 10⁻⁹를 의미하므로, 1 ns = 10⁻⁹ s 입니다." },
            { stage: "제4구역: 종합 응용", text: "컴퓨터의 데이터 용량 단위 중 가장 큰 것은?", options: ["1 kB", "1 MB", "1 GB", "1 TB"], answer: 3, explanation: "테라(T, 10¹²)가 기가(G, 10⁹), 메가(M, 10⁶), 킬로(k, 10³)보다 큽니다." },
            { stage: "제4구역: 종합 응용", text: "1 μA(마이크로암페어)는 몇 A(암페어) 입니까?", options: ["10⁻³ A", "10⁻⁶ A", "10⁻⁹ A", "10⁻¹² A"], answer: 1, explanation: "마이크로(μ)는 10⁻⁶을 의미하므로, 1 μA = 10⁻⁶ A 입니다." }
        ];

        const QUESTIONS_PER_GAME = 10;

        function App() {
            const [gameState, setGameState] = useState('start'); 
            const [gameQuestions, setGameQuestions] = useState([]);
            const [currentQIndex, setCurrentQIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [selectedOption, setSelectedOption] = useState(null);
            const [isCorrect, setIsCorrect] = useState(false);

            const startGame = () => {
                const shuffled = [...QUESTIONS].sort(() => Math.random() - 0.5).slice(0, QUESTIONS_PER_GAME);
                setGameQuestions(shuffled);
                setGameState('playing');
                setCurrentQIndex(0);
                setScore(0);
            };

            const handleOptionClick = (index) => {
                if (gameState !== 'playing') return;
                
                const currentQuestion = gameQuestions[currentQIndex];
                const correct = index === currentQuestion.answer;
                setSelectedOption(index);
                setIsCorrect(correct);
                if (correct) setScore(prev => prev + 1);
                
                setGameState('feedback');
            };

            const handleNext = () => {
                if (currentQIndex < gameQuestions.length - 1) {
                    setCurrentQIndex(prev => prev + 1);
                    setSelectedOption(null);
                    setGameState('playing');
                } else {
                    setGameState('result');
                }
            };

            const getResultAnalysis = () => {
                if (score === gameQuestions.length) return { title: "단위 마스터", desc: "출제된 모든 단위를 완벽히 이해했습니다! 어떤 과학/공학 계산도 문제없습니다.", color: "text-blue-600", bg: "bg-blue-100" };
                if (score >= gameQuestions.length * 0.6) return { title: "주니어 과학자", desc: "기본적인 단위는 잘 알고 있지만, 일부 헷갈리는 부분이 있습니다. 교과서를 한 번 더 복습해 보세요!", color: "text-green-600", bg: "bg-green-100" };
                return { title: "단위 훈련병", desc: "단위 기호와 접두어 크기가 아직 많이 낯선 상태입니다. 18~19쪽 표를 집중적으로 외워보세요.", color: "text-orange-600", bg: "bg-orange-100" };
            };

            return (
                <div className="min-h-screen flex items-center justify-center p-4">
                    <div className="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-slate-100">
                        
                        <div className="bg-indigo-600 p-4 text-center text-white">
                            <h1 className="text-xl font-bold flex items-center justify-center gap-2">
                                <IconBookOpen />
                                SI 연구소 방탈출
                            </h1>
                        </div>

                        {gameState === 'start' && (
                            <div className="p-8 text-center flex flex-col items-center">
                                <div className="text-indigo-600 mb-6 bg-indigo-100 p-4 rounded-full">
                                    <IconAward />
                                </div>
                                <h2 className="text-2xl font-bold mb-4">단위 마스터 퀘스트</h2>
                                <p className="text-slate-600 mb-8 leading-relaxed">
                                    연구소에 갇혔습니다! 무사히 탈출하려면 <strong>SI 기본 단위</strong>와 <strong>접두어</strong> 암호를 해독해야 합니다. 준비되셨나요?
                                </p>
                                <button 
                                    onClick={startGame}
                                    className="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 px-6 rounded-xl flex items-center justify-center gap-2 transition-all active:scale-95"
                                >
                                    <IconPlay /> 게임 시작하기
                                </button>
                            </div>
                        )}

                        {(gameState === 'playing' || gameState === 'feedback') && (
                            <div className="p-6">
                                <div className="flex justify-between items-center mb-4 text-sm font-medium text-slate-500">
                                    <span className="bg-indigo-100 text-indigo-700 px-3 py-1 rounded-full">
                                        {gameQuestions[currentQIndex].stage}
                                    </span>
                                    <span>{currentQIndex + 1} / {gameQuestions.length}</span>
                                </div>
                                
                                <div className="w-full bg-slate-100 h-2 rounded-full mb-6 overflow-hidden">
                                    <div 
                                        className="bg-indigo-600 h-2 rounded-full transition-all duration-300"
                                        style={{ width: `${((currentQIndex) / gameQuestions.length) * 100}%` }}
                                    ></div>
                                </div>

                                <h2 className="text-xl font-bold mb-6 leading-tight">
                                    {gameQuestions[currentQIndex].text}
                                </h2>

                                <div className="space-y-3">
                                    {gameQuestions[currentQIndex].options.map((option, index) => {
                                        let buttonStyle = "border-slate-200 hover:border-indigo-500 hover:bg-indigo-50 text-slate-700";
                                        
                                        if (gameState === 'feedback') {
                                            if (index === gameQuestions[currentQIndex].answer) {
                                                buttonStyle = "border-green-500 bg-green-50 text-green-700 font-bold";
                                            } else if (index === selectedOption) {
                                                buttonStyle = "border-red-500 bg-red-50 text-red-700";
                                            } else {
                                                buttonStyle = "border-slate-200 opacity-50";
                                            }
                                        }

                                        return (
                                            <button
                                                key={index}
                                                disabled={gameState === 'feedback'}
                                                onClick={() => handleOptionClick(index)}
                                                className={`w-full text-left p-4 rounded-xl border-2 transition-all ${buttonStyle}`}
                                            >
                                                <div className="flex items-center justify-between">
                                                    <span className="text-lg">{option}</span>
                                                    {gameState === 'feedback' && index === gameQuestions[currentQIndex].answer && <span className="text-green-500"><IconCheckCircle /></span>}
                                                    {gameState === 'feedback' && index === selectedOption && index !== gameQuestions[currentQIndex].answer && <span className="text-red-500"><IconXCircle /></span>}
                                                </div>
                                            </button>
                                        );
                                    })}
                                </div>

                                {gameState === 'feedback' && (
                                    <div className="mt-6 animate-fade-in">
                                        <div className={`p-4 rounded-xl ${isCorrect ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
                                            <p className="font-bold mb-1">{isCorrect ? '정답입니다! 🎉' : '아쉽네요! 💦'}</p>
                                            <p className="text-sm">{gameQuestions[currentQIndex].explanation}</p>
                                        </div>
                                        <button 
                                            onClick={handleNext}
                                            className="mt-6 w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 px-6 rounded-xl flex items-center justify-center gap-2 transition-all active:scale-95"
                                        >
                                            다음으로 이동 <IconChevronRight />
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {gameState === 'result' && (() => {
                            const analysis = getResultAnalysis();
                            return (
                                <div className="p-8 text-center flex flex-col items-center animate-fade-in">
                                    <h2 className="text-2xl font-bold mb-2">시뮬레이션 종료</h2>
                                    <div className="text-6xl font-black text-indigo-600 mb-6">
                                        {score} <span className="text-2xl text-slate-400">/ {gameQuestions.length}</span>
                                    </div>
                                    
                                    <div className={`w-full p-6 rounded-2xl mb-8 ${analysis.bg}`}>
                                        <h3 className={`text-xl font-bold mb-2 ${analysis.color}`}>
                                            {analysis.title}
                                        </h3>
                                        <p className="text-slate-700 text-sm leading-relaxed">
                                            {analysis.desc}
                                        </p>
                                    </div>

                                    <button 
                                        onClick={startGame}
                                        className="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-4 px-6 rounded-xl flex items-center justify-center gap-2 transition-all active:scale-95"
                                    >
                                        <IconRefresh /> 다시 도전하기
                                    </button>
                                </div>
                            );
                        })()}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
